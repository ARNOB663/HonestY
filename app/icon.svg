<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cream background with rounded corners to feel editorial, not corporate. -->
  <rect width="100" height="100" rx="22" fill="#fafaf7"/>
  <!-- Italic serif H in brand navy. Centered and weighted to read at 16px. -->
  <text
    x="42"
    y="78"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="92"
    font-weight="700"
    font-style="italic"
    fill="#1a2b4a"
    text-anchor="middle">H</text>
  <!-- Gold accent dot — same mark used after "Honesty" in the wordmark. -->
  <circle cx="78" cy="74" r="6" fill="#c9a961"/>
</svg>
